<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Tracker</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Forge Tracker">

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="themeToggle">Dark Mode</button>

        <h1 id="appTitle">FORGE TRACKER</h1>
        <p class="subtitle">Build discipline every day</p>

        <div class="input-row">
            <input id="habitInput" type="text" placeholder="Enter habit">

            <select id="categorySelect">
                <option value="Health">Health</option>
                <option value="Mind">Mind</option>
                <option value="Work">Work</option>
                <option value="Faith">Faith</option>
                <option value="Finance">Finance</option>
                <option value="Other">Other</option>
            </select>

            <button id="addHabitButton" onclick="addHabit()">Add Habit</button>
        </div>

        <p id="progressText">0 of 0 habits completed — 0%</p>

        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>

        <div class="data-actions">
    <button id="exportButton">Export Data</button>
    <button id="importButton">Import Data</button>
    <input type="file" id="importFile" accept=".json" hidden>
</div>

<div id="weekLabels" class="week-labels"></div>

        <ul id="habitList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
