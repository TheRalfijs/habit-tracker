<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Forge Tracker</title>

  <meta name="theme-color" content="#0F0F10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Forge Tracker" />

  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
  <p class="eyebrow">Forge Clique</p>
  <h1 id="currentDay">Thursday</h1>
  <p id="currentDateTime" class="subtitle">27 March • 22:41</p>
  <p id="subtitleText" class="subtitle subtitle-secondary">Keep the chain alive.</p>
    </div>

      <button id="themeToggle" class="icon-button" type="button" aria-label="Toggle theme">
        ☼
      </button>
    </header>

    <main class="content">
      <section class="today-card">
        <div class="today-row">
          <div>
            <p class="small-label">Completed</p>
            <p id="todayProgress" class="big-number">0 / 0</p>
          </div>

          <div class="divider"></div>

          <div>
            <p class="small-label">Top streak</p>
            <p id="topStreakText" class="big-number">0 days</p>
          </div>
        </div>

        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </section>

      <section class="composer-sheet">
        <div class="composer-grid">
          <input id="habitInput" type="text" placeholder="Add a habit" />
          <select id="categorySelect">
            <option value="Health">Health</option>
            <option value="Mind">Mind</option>
            <option value="Work">Work</option>
            <option value="Faith">Faith</option>
            <option value="Finance">Finance</option>
            <option value="Other">Other</option>
          </select>
          <button id="addHabitButton" type="button">Forge Habit</button>
        </div>
      </section>

      <section class="habit-section">
        <div class="section-header">
          <p class="eyebrow">Habits</p>
          <p id="habitCountText" class="section-meta">0 active</p>
        </div>

        <ul id="habitList" class="habit-list"></ul>

        <div id="emptyState" class="empty-state">
          <div class="empty-icon">🔥</div>
          <h2>No habits yet</h2>
          <p>Create one habit and start forging consistency.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
